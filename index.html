            padding: 40px;

            margin-bottom: 20px;
            color: #333;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        /* 统一王国 */
        .unified-kingdom {
            margin-bottom: 50px;
            padding: 30px;
            background: #fff9e6;
            border: 2px solid #f39c12;
            border-radius: 10px;
        }
        
        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #f39c12;
        }
        
        .unified-section {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            margin-right: 24px;
            align-self: flex-start;
        }
        .unified-prophets {
            display: grid;
            gap: 6px 24px;
            min-height: 32px;
            margin-bottom: 6px;
        }
        .unified-spacer {
            flex-shrink: 0;
            min-height: 270px;
        }
        .unified-kings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: nowrap;
            flex-shrink: 0;
            height: 240px;
            margin-top: 0;
        }
        
        /* 分裂王国时间线 */
        .timeline-wrapper {
            display: flex;
            align-items: center;
            gap: 0;
            position: relative;
            margin-top: 20px;
        }
        
        /* 外層滾動 */
        .outer-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: stretch;
        }
        
        .outer-scroll-content {
            display: flex;
            gap: 0;
            min-width: min-content;
            align-items: stretch;
            --col-width: 260px;
        }
        
        /* 固定標籤列 */
        .fixed-labels {
            flex-shrink: 0;
            position: sticky;
            left: 0;
            z-index: 10;
            background: white;
            padding-right: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .label-section {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 240px;
            margin-bottom: 30px;
        }
        .label-section.prophet-label {
            height: 120px;
            margin-bottom: 15px;
        }
        .label-section.prophet-label:first-child {
            margin-bottom: 15px;
        }
        .label-section:last-child {
            margin-bottom: 0;
        }
        
        .kingdom-label {
            font-size: 1.3em;
            font-weight: bold;
            padding: 15px 20px;
            border-radius: 5px;
            text-align: center;
            min-width: 100px;
            writing-mode: horizontal-tb;
        }
        
        .north-label {
            background: #e4e4e4;
            color: #000000;
            border: 2px solid #000000;
        }
        
        .south-label {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #c62828;
        }
        
        .prophet-label-text {
            font-size: 1em;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 5px;
            text-align: center;
            min-width: 100px;
            background: #f5f5f5;
            color: #555;
            border: 1px solid #ddd;
        }
        
        .prophet-timeline-row {

            align-items: stretch;
            gap: 24px;
            min-height: 120px;
            margin-bottom: 15px;
        }
        .prophet-timeline-row:last-of-type {

        .prophet-box-name { font-weight: bold; }
        .prophet-box-en { opacity: 0.9; }
        
        .timeline-body {

            flex-direction: column;

        .timeline-container {
            display: flex;
            gap: 24px;

    <script type="module">
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function kingFromToml(t) {
            const start = Number(t.start);
            const end = Number(t.end);
            const duration = start - end;
            const events = [];
            const deeds = (t.deeds && t.deeds.deed) ? (Array.isArray(t.deeds.deed) ? t.deeds.deed : [t.deeds.deed]) : [];
            deeds.forEach(function(d) {
                let cls = 'evil-deed';
                if (d.type === 'good') cls = 'good-deed';
                else if (d.type === 'Mixed' || d.type === 'mixed') cls = 'mixed-deed';
                events.push('<span class="' + cls + '">' + escapeHtml(d.name) + '</span>');
            });
            const godDeeds = (t.god_deeds && t.god_deeds.deed) ? (Array.isArray(t.god_deeds.deed) ? t.god_deeds.deed : [t.god_deeds.deed]) : [];
            godDeeds.forEach(function(d) {
                events.push('<span class="god-deed">' + escapeHtml(d.name) + '</span>');
            });
            const otherEvents = (t.other_events && t.other_events.event) ? (Array.isArray(t.other_events.event) ? t.other_events.event : [t.other_events.event]) : [];
            otherEvents.forEach(function(ev) {
                events.push('<span class="other-event">' + escapeHtml(ev.name) + '</span>');
            });
            return {
                name: t.name,
                en: t.en,
                start: start,
                end: end,
                type: t.type,
                kingdom: t.kingdom,
                events: events,
                yearsLabel: start + '-' + end + ' BC（' + duration + '年）'
            };
        }
        
        /** 計算兩位國王在位時間的重疊年數（BC 年：start > end） */
        function overlapYears(north, south) {
            const overlapStart = Math.min(north.start, south.start);
            const overlapEnd = Math.max(north.end, south.end);
            const years = overlapStart - overlapEnd + 1;
            return Math.max(0, years);
        }

        /** 計算配對分數：以重疊年數占較長在位年數為主，並給同年登基小幅加分 */
        function pairScore(north, south) {
            const overlap = overlapYears(north, south);
            if (overlap <= 0) return 0;
            const durN = north.start - north.end + 1;
            const durS = south.start - south.end + 1;
            const ratio = overlap / Math.max(durN, durS);
            const sameStartBonus = (north.start === south.start) ? 0.1 : 0;
            return ratio + sameStartBonus;
        }

        function buildAllPeriods(northKings, southKings) {
            const pairs = [];
            const candidatePairs = [];
            northKings.forEach(nk => {
                southKings.forEach(sk => {
                    const overlap = overlapYears(nk, sk);
                    if (overlap <= 0) return;
                    const score = pairScore(nk, sk);
                    candidatePairs.push({ north: nk, south: sk, score });
                });
            });
            candidatePairs.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                const overlapDiff = overlapYears(b.north, b.south) - overlapYears(a.north, a.south);
                if (overlapDiff !== 0) return overlapDiff;
                return (b.south?.end ?? 0) - (a.south?.end ?? 0);
            });

            const usedNorth = new Set();
            const usedSouth = new Set();

            // 指定配對優先：先鎖定使用者指定的組合，再進行一般自動配對
            const preferredPairs = [
                { northNames: ["拿答"], southNames: ["亞撒"] },
                { northNames: ["耶戶"], southNames: ["亞哈謝"] }
            ];
            preferredPairs.forEach(({ northNames, southNames }) => {
                const north = northKings.find(k => northNames.includes(k.name));
                const south = southKings.find(k => southNames.includes(k.name));
                if (!north || !south) return;
                if (overlapYears(north, south) <= 0) return;
                if (usedNorth.has(north) || usedSouth.has(south)) return;
                usedNorth.add(north);
                usedSouth.add(south);
                pairs.push({ north, south });
            });

            candidatePairs.forEach(({ north, south }) => {
                if (usedNorth.has(north) || usedSouth.has(south)) return;
                usedNorth.add(north);
                usedSouth.add(south);
                pairs.push({ north, south });
            });

            const allPeriods = [];
            pairs.forEach(({ north, south }) => {
                const overlapStart = Math.min(north.start, south.start);
                const overlapEnd = Math.max(north.end, south.end);
                allPeriods.push({
                    north,
                    south,
                    start: overlapStart,
                    end: overlapEnd
                });
            });
            northKings.forEach(nk => {
                if (usedNorth.has(nk)) return;
                allPeriods.push({ north: nk, south: null, start: nk.start, end: nk.end });
            });
            southKings.forEach(sk => {
                if (usedSouth.has(sk)) return;
                allPeriods.push({ north: null, south: sk, start: sk.start, end: sk.end });
            });
            allPeriods.sort((a, b) => {
                const endA = Math.max(a.north?.end ?? 0, a.south?.end ?? 0);
                const endB = Math.max(b.north?.end ?? 0, b.south?.end ?? 0);
                const endDiff = endB - endA;
                if (endDiff !== 0) return endDiff;
                const startA = Math.max(a.north?.start ?? 0, a.south?.start ?? 0);
                const startB = Math.max(b.north?.start ?? 0, b.south?.start ?? 0);
                return startB - startA;
            });
            return allPeriods;
        }
        
        function buildNavGrid(unifiedKings, allPeriods) {
            const rows = [[], []];
            unifiedKings.forEach(k => { rows[0].push(k); rows[1].push(null); });
            allPeriods.forEach(p => {
                rows[0].push(p.north);
                rows[1].push(p.south);
            });
            return { rows: rows };
        }
        
        let navGrid = null;
        let currentNav = { row: 0, col: 0 };
        
        function prophetFromToml(p) {
            const start = Number(p.start);
            const end = Number(p.end);
            const kings = Array.isArray(p.kings) ? p.kings : (p.kings ? [p.kings] : []);
            const kd = p.kingdom;
            const kingdoms = Array.isArray(kd) ? kd : (kd ? [kd] : []);
            const isNorth = kingdoms.includes('north');
            const isSouth = kingdoms.includes('south');
            const isUnified = kingdoms.includes('united');
            return { name: p.name, en: p.en || '', start, end, kings, isNorth, isSouth, isUnified };
        }
        
        function prophetOverlapsPeriod(prophet, period, targetKingdom) {
            if (targetKingdom === 'north') {
                return period.north && prophet.kings.includes(period.north.name);
            }
            if (targetKingdom === 'south') {
                return period.south && prophet.kings.includes(period.south.name);
            }
            const periodKings = [];
            if (period.north) periodKings.push(period.north.name);
            if (period.south) periodKings.push(period.south.name);
            return periodKings.some(k => prophet.kings.includes(k));
        }
        
        function computeProphetColumns(prophet, periods, targetKingdom) {
            let colStart = -1, colEnd = -1;
            periods.forEach((period, i) => {
                if (prophetOverlapsPeriod(prophet, period, targetKingdom)) {
                    if (colStart < 0) colStart = i;
                    colEnd = i + 1;
                }
            });
            return { colStart, colEnd };
        }
        
        function computeProphetLanes(prophets, periods, targetKingdom) {
            const placed = prophets.map(p => {
                const { colStart, colEnd } = computeProphetColumns(p, periods, targetKingdom);
                return { prophet: p, colStart, colEnd, lane: -1 };
            }).filter(x => x.colStart >= 0);
            placed.sort((a, b) => a.colStart - b.colStart);
            const laneOccupancy = [];
            placed.forEach(item => {
                let lane = 0;
                while (true) {
                    const overlaps = (laneOccupancy[lane] || []).some(l =>
                        item.colStart < l.colEnd && item.colEnd > l.colStart);
                    if (!overlaps) break;
                    lane++;
                }
                item.lane = lane;
                if (!laneOccupancy[lane]) laneOccupancy[lane] = [];
                laneOccupancy[lane].push(item);
            });
            return placed;
        }
        
        function createProphetBox(prophet, cssClass) {
            const box = document.createElement('div');
            box.className = `prophet-box ${cssClass}`;
            box.innerHTML = `
                <span class="prophet-box-name">${escapeHtml(prophet.name)}</span>
                <span class="prophet-box-en">${escapeHtml(prophet.en)}</span>
            `;
            return box;
        }
        
        function renderProphetTrack(placed, periods, container, cssClass, reverseRows) {
            container.innerHTML = '';
            if (periods.length === 0) return;
            container.style.gridTemplateColumns = `repeat(${periods.length}, var(--col-width))`;
            const maxLane = placed.length === 0 ? 0 : Math.max(...placed.map(p => p.lane));
            container.style.gridTemplateRows = `repeat(${maxLane + 1}, 24px)`;
            container.style.minHeight = Math.max(32, (maxLane + 1) * 30) + 'px';
            placed.forEach(({ prophet, colStart, colEnd, lane }) => {
                const box = createProphetBox(prophet, cssClass);
                box.style.gridColumn = `${colStart + 1} / ${colEnd + 1}`;
                box.style.gridRow = reverseRows ? (maxLane + 1 - lane) : (lane + 1);
                container.appendChild(box);
            });
        }
        
        function generateTimeline(allPeriods, grid, northProphets, southProphets) {
            const body = document.getElementById('timeline-body');
            if (!body) return;
            body.innerHTML = '';
            const baseCol = (grid && grid.rows[0]) ? grid.rows[0].length - allPeriods.length : 0;
            
            const northPlaced = computeProphetLanes(northProphets || [], allPeriods, 'north');
            const southPlaced = computeProphetLanes(southProphets || [], allPeriods, 'south');
            
            const northTrack = document.createElement('div');
            northTrack.className = 'prophet-track';
            renderProphetTrack(northPlaced, allPeriods, northTrack, 'north-prophet', true);
            body.appendChild(northTrack);
            
            const container = document.createElement('div');
            container.className = 'timeline-container';
            container.id = 'timeline-container';
            allPeriods.forEach((period, i) => {
                const colDiv = document.createElement('div');
                colDiv.className = 'time-column';
                const northSection = document.createElement('div');
                northSection.className = 'kingdom-section';
                if (period.north) {
                    northSection.appendChild(createKingBox(period.north, 0, baseCol + i));
                } else {
                    const emptyBox = document.createElement('div');
                    emptyBox.className = 'king-box empty';
                    emptyBox.innerHTML = (period.south && period.south.start > 735) ? '<div style="color:#999;">（見左欄）</div>' : '<div style="color:#999;">（已滅亡）</div>';
                    northSection.appendChild(emptyBox);
                }
                colDiv.appendChild(northSection);
                const southSection = document.createElement('div');
                southSection.className = 'kingdom-section';
                if (period.south) {
                    southSection.appendChild(createKingBox(period.south, 1, baseCol + i));
                } else {
                    const emptyBox = document.createElement('div');
                    emptyBox.className = 'king-box empty';
                    emptyBox.innerHTML = '<div style="color:#999;">（見左欄）</div>';
                    southSection.appendChild(emptyBox);
                }
                colDiv.appendChild(southSection);
                container.appendChild(colDiv);
            });
            body.appendChild(container);
            
            const southTrack = document.createElement('div');
            southTrack.className = 'prophet-track';
            renderProphetTrack(southPlaced, allPeriods, southTrack, 'south-prophet');
            body.appendChild(southTrack);
            
            requestAnimationFrame(() => syncUnifiedAlignment());
        }
        
        function syncUnifiedAlignment() {
            const spacer = document.querySelector('.unified-spacer');
            if (spacer) {
                spacer.style.height = (window.innerWidth <= 767 ? '190px' : '270px');
            }
        }
        
        const MAX_EVENTS_IN_BOX = 2;
        
        function createKingBox(king, row, col) {
            const box = document.createElement('div');
            box.className = `king-box ${king.type}-king`;
            
            const years = `${king.start}-${king.end} BC`;
            const duration = king.start - king.end;
            
            const allEvents = king.events;
            const showInBox = allEvents.slice(0, MAX_EVENTS_IN_BOX);
            const eventsHTML = showInBox.map(e => `<li>${e}</li>`).join('');
            
            box.setAttribute('data-name-zh', king.name);
            box.setAttribute('data-name-en', king.en);
            box.setAttribute('data-years', years + '（' + duration + '年）');
            box.setAttribute('data-events-full', JSON.stringify(allEvents));
            if (row !== undefined && col !== undefined) {
                box.setAttribute('data-nav-row', String(row));
                box.setAttribute('data-nav-col', String(col));
            }
            
            box.innerHTML = `
                <div class="king-name-zh">${king.name}</div>
                <div class="king-name-en">${king.en}</div>
                <div class="king-years">${years}（${duration}年）</div>
                <ul class="king-events">
                    ${eventsHTML}
                </ul>
            `;
            
            return box;
        }
        
        function getYearsLabel(king) {
            const d = king.start - king.end;
            return king.start + '-' + king.end + ' BC（' + d + '年）';
        }
        
        function renderModalForKing(king) {
            const eventsHTML = (king.events || []).map(ev => '<li>' + ev + '</li>').join('');
            const card = document.getElementById('modal-card');
            const years = king.yearsLabel || getYearsLabel(king);
            card.className = 'modal-card ' + (king.type || 'mixed') + '-king';
            card.innerHTML = `
                <div class="king-name-zh">${escapeHtml(king.name)}</div>
                <div class="king-name-en">${escapeHtml(king.en)}</div>
                <div class="king-years">${escapeHtml(years)}</div>
                <ul class="king-events">${eventsHTML}</ul>
            `;
        }
        
        function findValidPosition(r, c, dir) {
            if (!navGrid || !navGrid.rows) return null;
            
            if (r === 0 && c === 1 && dir === 'right') {
                if (navGrid.rows[1] && navGrid.rows[1][2] !== null) {
                    return { row: 1, col: 2, king: navGrid.rows[1][2] };
                }
            }
            
            if (r === 1 && c === 2 && dir === 'left') {
                if (navGrid.rows[0] && navGrid.rows[0][1] !== null) {
                    return { row: 0, col: 1, king: navGrid.rows[0][1] };
                }
            }
            
            if (r === 0 && c === 2 && dir === 'left') {
                if (navGrid.rows[0] && navGrid.rows[0][1] !== null) {
                    return { row: 0, col: 1, king: navGrid.rows[0][1] };
                }
            }
            
            let nr = r, nc = c;
            const maxSteps = 50;
            
            for (let step = 0; step < maxSteps; step++) {
                if (dir === 'left') nc--;
                else if (dir === 'right') nc++;
                else if (dir === 'up') nr--;
                else if (dir === 'down') nr++;
                
                if (nr < 0 || nr >= navGrid.rows.length) return null;
                const row = navGrid.rows[nr];
                if (!row || nc < 0 || nc >= row.length) return null;
                
                if (row[nc] !== null) {
                    return { row: nr, col: nc, king: row[nc] };
                }
            }
            
            return null;
        }
        
        function navigateModal(dir) {
            const result = findValidPosition(currentNav.row, currentNav.col, dir);
            if (result) {
                currentNav.row = result.row;
                currentNav.col = result.col;
                renderModalForKing(result.king);
                updateFocusedBox();
            }
        }
        
        function updateFocusedBox() {
            document.querySelectorAll('.king-box.focused').forEach(box => {
                box.classList.remove('focused');
            });
            
            const boxes = document.querySelectorAll('.king-box[data-nav-row][data-nav-col]');
            boxes.forEach(box => {
                const r = parseInt(box.getAttribute('data-nav-row'), 10);
                const c = parseInt(box.getAttribute('data-nav-col'), 10);
                if (r === currentNav.row && c === currentNav.col) {
                    box.classList.add('focused');
                }
            });
        }
        
        function openKingModal(e) {
            const box = e.currentTarget;
            if (box.classList.contains('empty')) return;
            const row = box.getAttribute('data-nav-row');
            const col = box.getAttribute('data-nav-col');
            if (row !== null && col !== null && navGrid) {
                currentNav.row = parseInt(row, 10);
                currentNav.col = parseInt(col, 10);
            }
            
            if (navGrid && navGrid.rows[currentNav.row] && navGrid.rows[currentNav.row][currentNav.col]) {
                renderModalForKing(navGrid.rows[currentNav.row][currentNav.col]);
            }
            
            document.getElementById('modal-overlay').classList.add('show');
        }
        
        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
        
        (function initModalSwipe() {
            const overlay = document.getElementById('modal-overlay');
            const card = document.getElementById('modal-card');
            let touchStart = { x: 0, y: 0 };
            overlay.addEventListener('touchstart', function(e) {
                if (!overlay.classList.contains('show') || !navGrid) return;
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }, { passive: true });
            overlay.addEventListener('touchmove', function(e) {
                if (!overlay.classList.contains('show')) return;
                const dx = e.touches[0].clientX - touchStart.x;
                const dy = e.touches[0].clientY - touchStart.y;
                if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
                    e.preventDefault();
                } else if (Math.abs(dy) > 50 && Math.abs(dy) > Math.abs(dx)) {
                    const rect = card.getBoundingClientRect();
                    const headerHeight = 100;
                    if (touchStart.y < rect.top + headerHeight) {
                        e.preventDefault();
                    }
                }
            }, { passive: false });
            overlay.addEventListener('touchend', function(e) {
                if (!overlay.classList.contains('show') || !navGrid) return;
                if (!e.changedTouches || !e.changedTouches[0]) return;
                const dx = e.changedTouches[0].clientX - touchStart.x;
                const dy = e.changedTouches[0].clientY - touchStart.y;
                const T = 50;
                if (Math.abs(dx) > T && Math.abs(dx) > Math.abs(dy)) {
                    navigateModal(dx > 0 ? 'left' : 'right');
                } else if (Math.abs(dy) > T && Math.abs(dy) > Math.abs(dx)) {
                    const rect = card.getBoundingClientRect();
                    if (touchStart.y < rect.top + 100) {
                        navigateModal(dy > 0 ? 'down' : 'up');
                    }
                }
            }, { passive: true });
        })();
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal-overlay').classList.remove('show');
                return;
            }
            
            const overlay = document.getElementById('modal-overlay');
            
            if (overlay.classList.contains('show') && navGrid) {
                const keyMap = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
                const dir = keyMap[e.key];
                if (dir) {
                    e.preventDefault();
                    navigateModal(dir);
                }
                return;
            }
            
            if (!overlay.classList.contains('show') && navGrid) {
                const keyMap = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
                const dir = keyMap[e.key];
                
                if (dir) {
                    e.preventDefault();
                    const result = findValidPosition(currentNav.row, currentNav.col, dir);
                    if (result) {
                        currentNav.row = result.row;
                        currentNav.col = result.col;
                        updateFocusedBox();
                    }
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (navGrid.rows[currentNav.row] && navGrid.rows[currentNav.row][currentNav.col]) {
                        const king = navGrid.rows[currentNav.row][currentNav.col];
                        renderModalForKing(king);
                        overlay.classList.add('show');
                    }
                }
            }
        });
        
        document.getElementById('unified-kings').addEventListener('click', function(e) {
            const box = e.target.closest('.king-box');
            if (box && !box.classList.contains('empty') && box.getAttribute('data-events-full')) {
                openKingModal({ currentTarget: box });
            }
        });
        
        document.getElementById('timeline-body').addEventListener('click', function(e) {
            const box = e.target.closest('.king-box');
            if (box && !box.classList.contains('empty') && box.getAttribute('data-events-full')) {
                openKingModal({ currentTarget: box });
            }
        });
        
        function renderUnifiedKings(unifiedKings, grid) {
            const container = document.getElementById('unified-kings');
            container.innerHTML = '';
            unifiedKings.forEach(function(king, idx) {
                container.appendChild(createKingBox(king, 0, idx));
            });
        }
        
        function computeUnifiedProphetPlacement(prophets, unifiedKings) {
            const periods = unifiedKings.map(k => ({ north: k, south: null, start: k.start, end: k.end }));
            return computeProphetLanes(prophets, periods, 'north');
        }
        
        function renderUnifiedProphets(unifiedKings, unifiedProphets) {
            const container = document.getElementById('unified-prophets');
            if (!container) return;
            if (!unifiedProphets || unifiedProphets.length === 0) {
                container.style.display = 'none';
                return;
            }
            const placed = computeUnifiedProphetPlacement(unifiedProphets, unifiedKings);
            if (placed.length === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'grid';
            container.style.gap = '6px 24px';
            container.style.gridTemplateColumns = unifiedKings.map(() => 'var(--col-width)').join(' ');
            const maxLane = Math.max(0, ...placed.map(p => p.lane));
            container.style.gridTemplateRows = `repeat(${maxLane + 1}, 24px)`;
            container.style.minHeight = (maxLane + 1) * 30 + 'px';
            placed.forEach(({ prophet, colStart, colEnd, lane }) => {
                const box = createProphetBox(prophet, 'unified-prophet');
                box.style.gridColumn = `${colStart + 1} / ${colEnd + 1}`;
                box.style.gridRow = lane + 1;
                container.appendChild(box);
            });
        }
        
        (async function loadFromToml() {
            const el = document.getElementById('unified-kings');
            try {
                const { default: J_TOML } = await import('https://esm.sh/@ltd/j-toml@1.38.0');
                const r = await fetch('./king_list.toml');
                if (!r.ok) throw new Error('HTTP ' + r.status + '：請確認 king_list.toml 與 index.html 在同一目錄，且用 npx serve 在該目錄執行');
                const tomlStr = await r.text();
                const data = J_TOML.parse(tomlStr);
                const all = (data.king || []).map(kingFromToml);
                const unifiedKings = all.filter(function(k) { return k && (k.kingdom === 'united'); });
                const northKings = all.filter(function(k) { return k && (k.kingdom === 'north'); });
                const southKings = all.filter(function(k) { return k && (k.kingdom === 'south'); });
                const allPeriods = buildAllPeriods(northKings, southKings);
                navGrid = buildNavGrid(unifiedKings, allPeriods);
                renderUnifiedKings(unifiedKings, navGrid);
                
                let northProphets = [];
                let southProphets = [];
                let unifiedProphets = [];
                try {
                    const pr = await fetch('./prophet_list.toml');
                    if (pr.ok) {
                        const ptoml = J_TOML.parse(await pr.text());
                        const prophets = (ptoml.prophet || []).map(p => prophetFromToml(p));
                        northProphets = prophets.filter(p => p.isNorth);
                        southProphets = prophets.filter(p => p.isSouth);
                        unifiedProphets = prophets.filter(p => p.isUnified);
                    }
                } catch (e) { console.warn('載入 prophet_list.toml 失敗，略過先知時間線', e); }
                
                renderUnifiedProphets(unifiedKings, unifiedProphets);
                generateTimeline(allPeriods, navGrid, northProphets, southProphets);
                window.addEventListener('resize', syncUnifiedAlignment);
                
                if (navGrid.rows[0] && navGrid.rows[0][0]) {
                    currentNav.row = 0;
                    currentNav.col = 0;
                    updateFocusedBox();
                }
            } catch (err) {
                console.error('載入 king_list.toml 失敗', err);
                el.innerHTML = '<p style="color:#c00;padding:1em;">載入失敗：' + escapeHtml(err.message) + '</p>';
            }
        })();
    </script>
</body>
</html>
