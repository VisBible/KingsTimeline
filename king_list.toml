name = "神使圍困以利沙的亞蘭軍眼目昏迷，並顯出火車火馬護衛先知（王下6:8-23）"
[[king.god_deeds.deed]]
name = "神使亞蘭軍聽見大軍車馬聲而逃跑，應驗以利沙關於撒馬利亞物價恢復的預言（王下7:1-19）"
[[king.god_deeds.deed]]
name = "神透過以利沙預言哈薛必作亞蘭王，並且會苦害以色列人（王下8:7-14）"


