# 統一王國
[[king]]
name = "大衛"
en = "David"
start = 1010
end = 970
type = "good"
kingdom = "united"
[king.deeds]
[[king.deeds.deed]]
name = "攻取耶路撒冷錫安保障，命名為「大衛城」（代上11:5, 7）"
type = "good"
[[king.deeds.deed]]
name = "將約櫃運往耶路撒冷，過程中烏撒伸手扶櫃被擊殺而一度停放俄別以東家（代上13:1-14）"
type = "good"
[[king.deeds.deed]]
name = "數次擊敗非利士人，制伏摩押、亞蘭、以東、亞們、亞瑪力、拉巴（代上14:8-16, 18:1-13, 19, 20）"
type = "good"
[[king.deeds.deed]]
name = "有心為神建殿，神因其流人血過多而不許，命所羅門建造（代上17:1-15, 22:8）"
type = "good"
[[king.deeds.deed]]
name = "為聖殿預備極其豐富的金、銀、銅、鐵、木石等材料（代上22:1-13, 28, 29:1-9）"
type = "good"
[[king.deeds.deed]]
name = "因數點百姓得罪神，引發三日瘟疫，後在阿珥楠禾場築壇獻祭使災止住（代上21）"
type = "evil"
[[king.deeds.deed]]
name = "因亞多尼雅要篡位，大衛趕緊立所羅門為王（王上1:5-40）"
type = "good"
[[king.deeds.deed]]
name = "大衛臨終囑咐所羅門要遵行神的律法以及其他政治決策（王上2:1-9）"
type = "good"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "以色列長老照著神的應許在希伯崙膏立大衛為王（代上11:1-3）"
[[king.god_deeds.deed]]
name = "耶和華使以色列人擊殺非利士人，大獲全勝（代上11:14）"
[[king.god_deeds.deed]]
name = "神在烏撒因手扶約櫃被擊殺後，賜福給存放約櫃的俄別以東家（代上13:9-14）"
[[king.god_deeds.deed]]
name = "神將非利士人交在大衛手中，指示大衛要如何攻打非利士，又使列國都懼怕他（代上14:8-17）"
[[king.god_deeds.deed]]
name = "神藉先知拿單傳達「大衛之約」，應許其子孫必建聖殿，且國位必堅定直到永遠（代上17:3-15）"
[[king.god_deeds.deed]]
name = "神差遣先見迦得讓大衛在三樣災中選擇，後降瘟疫於以色列，但在大衛謙卑禱告後，神後悔不降災（代上21:9-17）"
[[king.god_deeds.deed]]
name = "神差使者吩咐大衛在阿珥楠禾場築壇，大衛在禾場獻祭時，神使火從天降在燔祭壇上應允他（代上21:18-31）"
[[king.god_deeds.deed]]
name = "神親手劃出聖殿的樣式，使大衛明白如何指示所羅門建造（代上28:19）"

[king.other_events]
[[king.other_events.event]]
name = "推羅王希蘭將香柏木運到大衛那裡，並差遣石匠、木匠為他建造宮殿（代上14:1）"
[[king.other_events.event]]
name = "非利士人兩次在利乏音谷安營尋索大衛，最終被大衛擊敗（代上14:8-16）"
[[king.other_events.event]]
name = "摩押被大衛征服，成為大衛的僕人，並向他進貢（代上18:2）"
[[king.other_events.event]]
name = "瑣巴王哈大利謝與大衛爭戰，大衛奪了他的戰車、馬匹、步兵（代上18:3-4）"
[[king.other_events.event]]
name = "大馬士革的亞蘭人前來幫助瑣巴王，被大衛殺死二萬二千人，隨後歸服進貢（代上18:5-6）"
[[king.other_events.event]]
name = "哈馬王陀烏因大衛擊敗其仇敵哈大利謝，差遣兒子哈多蘭帶著金銀銅器向大衛致安祝福（代上18:9-10）"
[[king.other_events.event]]
name = "亞捫王哈嫩受首領聳動，凌辱大衛派去弔喪的臣僕，剃去他們一半鬍鬚並割斷衣服（代上19:1-4）"
[[king.other_events.event]]
name = "亞捫拿一千他連得銀子從美索不達米亞、亞蘭、瑪迦、瑣巴雇傭戰車馬兵對抗大衛（代上19:6-7）"
[[king.other_events.event]]
name = "埃及法老為逃亡的以東王後裔哈達提供食物、房屋與田地，甚至將王后的妹子賜他為妻（王上11:18-19）"

[[king]]
name = "所羅門"
en = "Solomon"
start = 971
end = 931
type = "mixed"
kingdom = "united"

[king.deeds]
[[king.deeds.deed]]
name = "治死亞多尼雅，革除祭司亞比亞他，殺死約押；立比拿雅作元帥，立撒督作祭司（王上2:13-35）"
type = "good"
[[king.deeds.deed]]
name = "限制示每居住在耶路撒冷，但他違反規定，所羅門吩咐比拿雅治死他（王上2:36-46）"
type = "good"
[[king.deeds.deed]]
name = "娶了埃及王法老的女兒（王上3:1）"
type = "evil"
[[king.deeds.deed]]
name = "在基遍向神求智慧以判斷民事，蒙神應允並獲賜富足與尊榮（王上3:5-14, 代下1:7-12）"
type = "good"
[[king.deeds.deed]]
name = "有智慧斷案，找到孩子的親生母親（王上3:16-28）"
type = "good"
[[king.deeds.deed]]
name = "作箴言三千句、詩歌一千零五首（王上4:32）"
type = "good"
[[king.deeds.deed]]
name = "耗時 7 年建成耶和華的聖殿（王上6:38，代下3）"
type = "good"
[[king.deeds.deed]]
name = "耗時 13 年建成自己的宮室（王上7:1）"
type = "evil"
[[king.deeds.deed]]
name = "差遣人去推羅召來戶蘭，製作聖殿的各樣設備（王上7:13-51，代下2:7-14,4）"
type = "good"
[[king.deeds.deed]]
name = "將約櫃從大衛城運進聖殿，神的榮光充滿這殿（王上8:1-11，代下5:2-14）"
type = "good"
[[king.deeds.deed]]
name = "王和眾人在神面前奉獻聖殿，甚至因銅壇太小、容不下脂油，而將殿前院子分別為聖來獻祭（王上8:62-64，代下7:1-10）"
type = "good"
[[king.deeds.deed]]
name = "把加利利的二十座城給推羅王希蘭（王上8:10-13）"
type = "evil"
[[king.deeds.deed]]
name = "所羅門挑取不能滅盡、外邦人的後裔作服苦的奴僕，不過不讓以色列人當奴僕（王上9:20-22，代下8:7-9）"
type = "evil"
[[king.deeds.deed]]
name = "所羅門用金子錘出擋牌、盾牌，並且用象牙製造寶座。宮裡所有的器皿都是精金的。（王上10:16-21）"
type = "evil"
[[king.deeds.deed]]
name = "所羅門拿希蘭回送（退貨）的那些城邑，使以色列人居住在那裡；他又在各地建造了積貨城（代下 8:2-6）。"
type = "mixed"
[[king.deeds.deed]]
name = "所羅門將法老的女兒帶出大衛城，到為她建造的宮裡（王上9:24, 代下8:11）"
type = "evil"
[[king.deeds.deed]]
name = "寵愛外邦妃嬪，心偏離耶和華去事奉別神，引發神的憤怒（王上11:1-13）"
type = "evil"


[king.god_deeds]
[[king.god_deeds.deed]]
name = "神使所羅門在以色列眾人眼前甚為尊大、極其威嚴，勝過他以前的以色列王。（代上29:25）"
[[king.god_deeds.deed]]
name = "神在基遍在夢中向所羅門顯現，賜予他前無古人、後無來者的智慧，以及富足與尊榮。並且告訴他，若效法他父親大衛遵行神的道，神會使他長壽。（王上3:5-14，代下1:7-12）"
[[king.god_deeds.deed]]
name = "神告訴所羅門，若他遵行神的律例、遵從神的誡命，上帝就會應驗祂向大衛的應許，必住在以色列人中間，不丟棄以色列民（王上 6:11-13）"
[[king.god_deeds.deed]]
name = "聖殿完工運入約櫃時，神的榮光充滿殿中，使祭司不能站立供職（王上8:10-11，代下5:13-14）"
[[king.god_deeds.deed]]
name = "所羅門禱告後，神使火從天降下燒盡燔祭，神的榮光再次充滿殿宇，祭司甚至不能進殿（代下7:1-2）"
[[king.god_deeds.deed]]
name = "神二次向所羅門顯現，應許若遵守律法必堅固國位，若離棄神則必剪除以色列人（王上9:2-9，代下7:12-22）"
[[king.god_deeds.deed]]
name = "神因所羅門晚年背離，向他發怒，說必將他的國奪回，賜給他的臣子。但因大衛的緣故，這事要在他兒子手中發生，並且要留一個支派給他的兒子（王上11:9-13)"
[[king.god_deeds.deed]]
name = "神興起哈達、利遜作為所羅門的敵人（王上11:14, 23）"
[[king.god_deeds.deed]]
name = "神藉先知亞希雅將新衣撕成十二片，預言國度將分裂，並將十個支派賜給耶羅波安（王上11:29-39）"

[king.other_events]
[[king.other_events.event]]
name = "埃及法老將女兒嫁給所羅門，並攻取基色城作為女兒的妝奩（王上3:1, 9:16）"
[[king.other_events.event]]
name = "所羅門在世的日子，從大河到非利士地，這些國都進貢服事他（王上4:21）"
[[king.other_events.event]]
name = "推羅王希蘭與所羅門立約，提供建殿所需的香柏木、松木、檀香木，並派遣巧匠戶蘭協助工事（王上5:1-12, 7:13-45, 9:11, 代下2:3-16, 3:15-4:17）"
[[king.other_events.event]]
name = "示巴女王慕名而來，用難解的話試問所羅門，並贈送極多金子、寶石與香料（王上10:1-10, 代下9:1-9）"
[[king.other_events.event]]
name = "普天下的王都求見所羅門要聽其智慧，每年各帶金器、銀器、軍械等貢物而來（王上10:24-25, 代下9:23-24）"
[[king.other_events.event]]
name = "以東人哈達興起，亞蘭的利遜在大馬士革做王，成為以色列的敵人（王上11:14, 23-25）"
[[king.other_events.event]]
name = "晚年埃及王示撒收留逃亡的耶羅波安（王上11:40）"

# 北國以色列
[[king]]
name = "耶羅波安一世"
en = "Jeroboam I"
start = 931
end = 910
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "帶領十個支派背叛大衛家，分裂王國（王上12:16-20, 代下10:16）"
type = "evil"
[[king.deeds.deed]]
name = "建築示劍和毗努伊勒（王上12:25）"
type = "mixed"
[[king.deeds.deed]]
name = "鑄造兩隻金牛犢安置在伯特利和但，立凡民（非利未人）為祭司，私定節期、建殿、自行獻祭，陷民於罪中（王上12:26-35, 代下11:15）"
type = "evil"
[[king.deeds.deed]]
name = "在祭壇旁伸手要拿住神人，手便枯乾，後經神人禱告才復原（王上13:4-6）"
type = "evil"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "神差遣神人從猶大到伯特利，預言大衛家必生約西亞王來毀滅偶像的祭司和壇，並使王枯乾的手復原（王上13:1-6）"
[[king.god_deeds.deed]]
name = "神藉先知亞希雅預言耶羅波安家男丁必被剪除，且其子必死，果真應驗（王上14:7-17）"


[[king]]
name = "拿答"
en = "Nadab"
start = 910
end = 909
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "行惡，效法其父。在圍困非利士的基比頓時被巴沙背叛殺害（王上15:26-27）"
type = "evil"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "神應驗藉亞希雅所說的話，使巴沙篡位並滅耶羅波安全家（王上15:29）"


[[king]]
name = "巴沙"
en = "Baasha"
start = 909
end = 886
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "殺盡耶羅波安全家，卻仍行耶羅波安所行的惡（王上15:29, 34）"
type = "evil"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "神的話臨到哈拿尼的兒子耶戶，責備巴沙並預言其家必像耶羅波安家一樣被除盡（王上16:1-4）"

[king.other_events]
[[king.other_events.event]]
name = "亞蘭王便哈達受猶大王亞撒之賂，背棄與巴沙之約，攻打以色列的城邑（王上15:18-20）"

[[king]]
name = "以拉"
en = "Elah"
start = 886
end = 885
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "和他父親一樣拜偶像（王上16:13）"
type = "evil"
[[king.deeds.deed]]
name = "在臣子家喝醉時被心利所殺（王上16:9-10）"
type = "evil"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "神應驗藉先知耶戶責備巴沙的話，使心利殺害以拉並滅巴沙全家（王上16:12）"

[[king]]
name = "心利"
en = "Zimri"
start = 885
end = 885
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "篡位後殺盡巴沙全家，僅作王7日，見城被圍便自焚而死（王上16:11, 15-18）"
type = "evil"
[[king.deeds.deed]]
name = "行耶羅波安所行的那罪（王上16:19）"
type = "evil"

[[king]]
name = "暗利"
en = "Omri"
start = 885
end = 874
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "買下撒馬利亞山建城作為首都（王上16:24）"
type = "mixed"
[[king.deeds.deed]]
name = "行惡比以前的王更甚（王上16:25-26）"
type = "evil"

[[king]]
name = "亞哈"
en = "Ahab"
start = 874
end = 853
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
name = "娶西頓王的女兒耶洗別為妻，引進巴力崇拜，為之建廟築壇，作惡勝過以前的王（王上16:30-33）"
type = "evil"
[[king.deeds.deed]]
name = "其妻耶洗別殺耶和華眾先知（王上18:4）"
type = "evil"
[[king.deeds.deed]]
name = "與先知以利亞經歷迦密山試驗（王上18:16-46）"
type = "mixed"
[[king.deeds.deed]]
name = "私自放掉亞蘭王便哈達，並且與他立約（王上20:34）"
type = "evil"
[[king.deeds.deed]]
name = "貪謀拿伯的葡萄園而殺害拿伯（王上21:1-16）"
type = "evil"
[[king.deeds.deed]]
name = "找猶大王約沙法一起去打基列的拉末，不聽先知米該雅的警告，在戰爭中中箭身亡（王上22:4-37）"
type = "evil"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "神藉以利亞預言旱荒（王上17:1）"
[[king.god_deeds.deed]]
name = "神在基立溪旁供養以利亞，並藉他的手使撒勒法寡婦的麵與油不短缺，且使其子復活（王上17:2-24）"
[[king.god_deeds.deed]]
name = "神在迦密山降火顯應，證明祂是神，隨後降下大雨結束旱災（王上18:36-46）"
[[king.god_deeds.deed]]
name = "神在何烈山以微小的聲音向以利亞顯現，並命他膏立哈薛為亞蘭王、耶戶為以色列新王、膏以利沙為先知（王上19:9-18）"
[[king.god_deeds.deed]]
name = "神藉先知指點亞哈擊敗亞蘭王便哈達，並因亞哈私放敵王而預言亞哈必賠命（王上20:13-42）"
[[king.god_deeds.deed]]
name = "神藉以利亞責備亞哈謀害拿伯，預言亞哈家必滅亡，後因亞哈自卑而延遲災禍（王上21:17-29）"
[[king.god_deeds.deed]]
name = "神差遣「謊言的靈」入先知口中引誘亞哈陣亡，並藉米該雅預言其必敗（王上22:19-28, 代下18）"

[king.other_events]
[[king.other_events.event]]
name = "西頓王將女兒耶洗別嫁給亞哈（王上16:31）"
[[king.other_events.event]]
name = "亞蘭王便哈達率領三十二個王圍攻撒馬利亞，索要金銀、妻子、兒女（王上20:1-6）"
[[king.other_events.event]]
name = "亞蘭王在基列拉末與亞哈交戰，下令只攻擊以色列王（王上22:31）"

[[king]]
name = "亞哈謝"
en = "Ahaziah"
start = 853
end = 852
type = "evil"
kingdom = "north"


[king.deeds]
[[king.deeds.deed]]
name = "行耶和華眼中看為惡的事，敬拜巴力，效法耶羅波安的罪惡（王上22:52-53）"
type = "evil"
[[king.deeds.deed]]
name = "跟約沙法說想一起跟他去厄斐運金子，被拒（王上22:48-49）"
type = "evil"
[[king.deeds.deed]]
name = "從樓上欄杆掉下去就病了，病重時求問外邦神巴力西卜，被以利亞責備後病死（王下1:2, 17）"
type = "evil"

[king.god_deeds]
[[king.god_deeds.deed]]
name = "神藉以利亞預言王必不下床，必病死，並二次降火燒滅前來逮捕以利亞的五十夫長與兵眾（王下1:3-17）"

[king.other_events]
[[king.other_events.event]]
name = "摩押在亞哈死後背叛以色列（王下1:1）"

[[king]]
name = "約蘭"
en = "Joram"
start = 852
end = 841
type = "evil"
kingdom = "north"

[king.deeds]
[[king.deeds.deed]]
