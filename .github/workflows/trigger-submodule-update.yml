# KingsTimeline 有 push 時，通知 VisBible.github.io 更新 submodule
name: Trigger submodule update on VisBible.github.io

on:
  push:
    branches: [main, master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repository_dispatch on VisBible.github.io
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/VisBible/VisBible.github.io/dispatches \
            -d '{"event_type":"submodule-update"}')
          http_code=$(echo "$resp" | tail -n1)
          if [ "$http_code" -ne 204 ]; then
            echo "Dispatch failed (HTTP $http_code). Response: $(echo "$resp" | sed '$d')"
            exit 1
          fi
          echo "Dispatch sent successfully (204)."
